version: '3.8'

services:

  # ─── MySQL Database ───────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: smart-canteen-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"   # maps host port 3307 to avoid conflict with local MySQL
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Laravel + React App ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: ${APP_NAME}
        APP_ENV: ${APP_ENV}
        APP_KEY: ${APP_KEY}
        APP_DEBUG: ${APP_DEBUG}
        APP_URL: ${APP_URL}
        FRONTEND_URL: ${FRONTEND_URL}
        LOG_LEVEL: ${LOG_LEVEL}
        DB_CONNECTION: ${DB_CONNECTION}
        DB_HOST: db                  # points to the 'db' service above
        DB_PORT: 3306
        DB_DATABASE: ${DB_DATABASE}
        DB_USERNAME: ${DB_USERNAME}
        DB_PASSWORD: ${DB_PASSWORD}
        VITE_BACKEND_ENDPOINT: ${VITE_BACKEND_ENDPOINT}
    container_name: smart-canteen-app
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
